spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true
spring.flyway.create-schemas=true

security.jwt.secret=test-secret-key-for-hs256-minimum-32b
security.jwt.access-expiration=900000
security.jwt.refresh-expiration=2592000000

app.security.refresh-token.pepper=test-pepper-value-for-unit-tests-only
app.mail.from=no-reply@pos.test

app.security.auth-cookie.name=AUTH_TOKEN
app.security.auth-cookie.path=/
app.security.auth-cookie.http-only=true
app.security.auth-cookie.secure=false
app.security.auth-cookie.max-age=3600
app.security.auth-cookie.same-site=Lax

app.security.cookie.refresh-token-name=REFRESH_TOKEN
app.security.cookie.refresh-token-path=/
app.security.cookie.same-site=Lax
app.security.cookie.secure=false

app.security.trusted-proxies=127.0.0.1,localhost
app.security.max-user-agent-length=500

app.auth.email-verification.token-ttl=PT24H
app.auth.email-verification.request-cooldown=PT1M
app.auth.email-verification.token-pepper=test-pepper-email-verification
app.auth.email-verification.verify-path=/verify-email
app.auth.email-verification.subject=Verify Your Email

app.auth.password-reset.token-ttl=PT24H
app.auth.password-reset.request-cooldown=PT5M
app.auth.password-reset.token-pepper=test-pepper-password-reset
app.auth.password-reset.reset-path=/reset-password
app.auth.password-reset.subject=Reset Your Password

app.auth.sms.delivery-mode=LOG_ONLY
app.auth.sms.password-reset-code-ttl=PT10M
app.auth.sms.phone-verification-code-ttl=PT10M
app.auth.sms.request-cooldown=PT1M
app.auth.sms.daily-request-limit=15
app.auth.sms.code-length=6
app.auth.sms.max-attempts=5
app.auth.sms.code-pepper=test-sms-code-pepper

app.frontend.base-url=http://localhost:3000
app.frontend.mobile-base-url=http://localhost:3000/mobile
app.frontend.universal-base-url=http://localhost:3000
app.frontend.default-link-target=WEB

app.bootstrap.super-admin.enabled=false
app.bootstrap.super-admin.email=admin@example.com
app.bootstrap.super-admin.username=admin
app.bootstrap.super-admin.password=testpassword123
app.bootstrap.super-admin.first-name=Admin
app.bootstrap.super-admin.last-name=User