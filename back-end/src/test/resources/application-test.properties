spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true
spring.flyway.create-schemas=true

security.jwt.secret=test-secret-key-for-hs256-minimum-32b
security.jwt.access-expiration=900000
security.jwt.refresh-expiration=2592000000

app.security.refresh-token.pepper=test-pepper-value-for-unit-tests-only
app.mail.from=no-reply@pos.test

app.security.auth-cookie.name=AUTH_TOKEN
app.security.auth-cookie.path=/
app.security.auth-cookie.http-only=true
app.security.auth-cookie.secure=false
app.security.auth-cookie.max-age=3600
app.security.auth-cookie.same-site=Lax