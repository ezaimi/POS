spring.datasource.url=jdbc:postgresql://localhost:5432/pos?currentSchema=app_test
spring.datasource.username=pos_user
spring.datasource.password=pos_pass

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.default_schema=app_test
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true
spring.flyway.default-schema=app_test
spring.flyway.schemas=app_test
spring.flyway.create-schemas=true

security.jwt.secret=test-secret-key-for-hs256-minimum-32b
security.jwt.access-expiration=900000
security.jwt.refresh-expiration=2592000000

app.security.refresh-token.pepper=test-pepper-value-for-unit-tests-only
app.mail.from=no-reply@pos.test
