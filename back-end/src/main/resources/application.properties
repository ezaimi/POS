spring.application.name=Pos

spring.datasource.url=jdbc:postgresql://localhost:5432/pos
spring.datasource.username=pos_user
spring.datasource.password=pos_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

security.jwt.secret=${JWT_SECRET}
security.jwt.access-expiration=900000
security.jwt.refresh-expiration=2592000000