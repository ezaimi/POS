spring:
  application:
    name: Pos
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://localhost:5432/pos
    username: pos_user
    password: pos_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 15m
    refresh-expiration: 30d

app:
  bootstrap:
    super-admin:
      email: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:admin@pos.local}
      password: ${BOOTSTRAP_SUPER_ADMIN_PASSWORD:ChangeMe123!}
      first-name: ${BOOTSTRAP_SUPER_ADMIN_FIRST_NAME:Super}
      last-name: ${BOOTSTRAP_SUPER_ADMIN_LAST_NAME:Admin}

  mail:
    from: ${MAIL_FROM:${spring.mail.username:no-reply@pos.local}}

  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}