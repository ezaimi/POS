server:
  forward-headers-strategy: none

spring:
  application:
    name: Pos
  profiles:
    default: local
  sql:
    init:
      mode: always

  datasource:
    url: jdbc:postgresql://localhost:5432/pos
    username: pos_user
    password: pos_pass
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: ${JWT_SECRET:change-this-local-dev-secret-key-please-1234567890}
    access-expiration: 15m
    refresh-expiration: 30d

app:
  security:
    max-user-agent-length: 512

    trusted-proxies:
      # LOCAL DEV ONLY — must be overridden in production with the real proxy IP(s)
      # (e.g. your NGINX / load-balancer IP as seen by the app)
      # Failure to update this will cause all requests to fall back to the proxy IP
      # instead of the real client IP, breaking rate limiting and audit logs.
      - 127.0.0.1
      - ::1

    login:
      max-failed-attempts: 5
      lock-duration-minutes: 15
      max-attempts-per-ip: 20
      max-attempts-per-account: 5
      window-minutes: 5
      attempt-retention-days: 90

    session:
      max-active-sessions: 3

    refresh-token:
      pepper: ${REFRESH_TOKEN_PEPPER}
      rate-limit:
        max-attempts-per-ip: 20
        window-minutes: 1

    cookie:
      refresh-token-name: refreshToken
      refresh-token-path: /auth/web
      same-site: Strict
      secure: true
      domain:

  bootstrap:
    super-admin:
      email: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:admin@pos.local}
      password: ${BOOTSTRAP_SUPER_ADMIN_PASSWORD:ChangeMe123!}
      first-name: ${BOOTSTRAP_SUPER_ADMIN_FIRST_NAME:Super}
      last-name: ${BOOTSTRAP_SUPER_ADMIN_LAST_NAME:Admin}

  auth:
    password-reset:
      token-ttl: ${PASSWORD_RESET_TOKEN_TTL:30m}
      request-cooldown: ${PASSWORD_RESET_REQUEST_COOLDOWN:2m}
      token-pepper: ${PASSWORD_RESET_TOKEN_PEPPER:change-this-local-dev-password-reset-pepper}
      reset-path: ${PASSWORD_RESET_FRONTEND_PATH:/reset-password}
      subject: ${PASSWORD_RESET_EMAIL_SUBJECT:Reset your POS password}

    email-verification:
      token-ttl: ${EMAIL_VERIFICATION_TOKEN_TTL:24h}
      request-cooldown: ${EMAIL_VERIFICATION_REQUEST_COOLDOWN:5m}
      token-pepper: ${EMAIL_VERIFICATION_TOKEN_PEPPER:change-this-local-dev-email-verification-pepper}
      verify-path: ${EMAIL_VERIFICATION_FRONTEND_PATH:/verify-email}
      subject: ${EMAIL_VERIFICATION_EMAIL_SUBJECT:Verify your POS email}

  mail:
    from: ${MAIL_FROM:${spring.mail.username:no-reply@pos.local}}

  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
