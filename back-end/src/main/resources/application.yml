spring:
  application:
    name: Pos
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://localhost:5432/pos
    username: pos_user
    password: pos_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 15m
    refresh-expiration: 30d
