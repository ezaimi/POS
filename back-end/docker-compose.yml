services:
  db:
    image: postgres:16
    container_name: pos-db
    environment:
      POSTGRES_DB: pos_local
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: pos-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
