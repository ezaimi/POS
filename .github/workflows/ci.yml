name: CI

# on => when will the CI run in which branches, ** this means in all branches before pushing run CI
#       but in pull request run CI only if you pull from main or develop
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, develop ]


# jobs shows what actually does when it runs
jobs:
  # build shows which VM to use
  build:
    runs-on: ubuntu-latest
    # steps is the list of actual commands that run on that Ubuntu machine, in order, one by one.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('back-end/pom.xml') }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        working-directory: back-end
        run: chmod +x mvnw && ./mvnw verify



